[font]
size = 12.5

[font.bold]
family = "JetBrainsMono NF"
style = "ExtraBold"

[font.normal]
family = "JetBrainsMono NF"
style = "Bold"

[scrolling]
history = 10000
multiplier = 3

[window]
decorations = "buttonless"
opacity = 1
option_as_alt = "OnlyLeft"
startup_mode = "Windowed"

[window.padding]
x = 3
y = 3

[window.position]
x = 1600
y = 0

[env]
TERM = "xterm-256color"
